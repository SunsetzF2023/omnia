<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>2048 — Omnia</title>
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#1c2128;--border:#30363d;--text:#e6edf3;--dim:#8b949e;--amber:#d29922;--amber-dim:#3d2b00;--green:#39d353;--red:#f85149;--teal:#2ea58c;--teal-t:#3ecfb0;--mono:'JetBrains Mono','Fira Code','Courier New',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--mono);display:flex;justify-content:center;align-items:center;min-height:100vh;flex-direction:column;gap:10px;padding:20px}
.g2048-header{display:flex;align-items:center;gap:20px;flex-wrap:wrap;justify-content:center}
.g2048-title{font-size:42px;font-weight:800}
.g2048-stat{text-align:center}
.g2048-stat-label{font-size:10px;color:var(--dim);text-transform:uppercase}
.g2048-stat-val{font-size:22px;font-weight:700}
.g2048-new-btn{padding:8px 18px;background:var(--amber-dim);border:1px solid var(--amber);color:var(--amber);border-radius:4px;font-family:var(--mono);font-size:12px;cursor:pointer;transition:all .15s}
.g2048-new-btn:hover{background:#4d3a00}
.g2048-body{display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;justify-content:center}
.g2048-wrap{position:relative}
.g2048-grid{display:grid;background:var(--bg3);border-radius:8px;padding:8px;position:relative}
.g2048-msg{position:absolute;inset:0;background:rgba(13,17,23,.78);display:none;align-items:center;justify-content:center;border-radius:8px;z-index:10;flex-direction:column;font-family:var(--mono)}
.g2048-lb{min-width:200px;max-width:260px;max-height:420px;overflow-y:auto;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px}
.g2048-lb-title{font-size:13px;font-weight:700;color:var(--teal-t);margin-bottom:6px;text-align:center}
.g2048-lb-pager{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:4px;font-size:11px;color:var(--dim)}
.g2048-lb-pager button{background:var(--bg3);border:1px solid var(--border);color:var(--dim);border-radius:3px;cursor:pointer;font-size:10px;padding:1px 6px}
.g2048-lb-item{display:flex;justify-content:space-between;font-size:11px;padding:3px 4px;border-bottom:1px solid var(--border);color:var(--dim)}
.g2048-lb-clickable{cursor:pointer;transition:color .1s}
.g2048-lb-clickable:hover{color:var(--amber)}
.g2048-over{font-size:26px;font-weight:700;color:var(--red)}
.g2048-win{font-size:26px;font-weight:700;color:var(--amber);text-align:center}
.g2048-tile{position:absolute;display:flex;align-items:center;justify-content:center;font-weight:700;border-radius:4px;transition:transform .15s ease-in-out;z-index:1}
.g2048-new{animation:pop .2s ease-out}
@keyframes pop{0%{transform:scale(0)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
.gm-hint{font-size:11px;color:var(--dim);text-align:center;margin-top:4px}
.diff-bar{display:flex;gap:4px;margin:4px 0}
.diff-btn{padding:4px 12px;background:var(--bg2);border:1px solid var(--border);color:var(--dim);border-radius:4px;font-size:11px;cursor:pointer;font-family:var(--mono);transition:all .15s}
.diff-btn.active{background:var(--amber-dim);border-color:var(--amber);color:var(--amber)}
.brand{font-size:10px;color:var(--dim);position:absolute;bottom:10px;right:16px}
.brand a{color:var(--teal-t);text-decoration:none}
</style>
</head>
<body>
<div class="g2048-header">
  <div class="g2048-title">2<span style="color:var(--amber)">0</span>4<span style="color:var(--amber)">8</span></div>
  <div class="g2048-stat"><div class="g2048-stat-label">分数</div><div class="g2048-stat-val" id="g24-score">0</div></div>
  <button class="g2048-new-btn" onclick="G24.init()">新游戏</button>
</div>
<div class="diff-bar">
  <button class="diff-btn active" onclick="setSize(4)">4×4</button>
  <button class="diff-btn" onclick="setSize(5)">5×5</button>
  <button class="diff-btn" onclick="setSize(6)">6×6</button>
</div>
<div class="g2048-body">
  <div class="g2048-wrap">
    <div id="g24-particles"></div>
    <div class="g2048-grid" id="g24-grid"></div>
    <div class="g2048-msg" id="g24-msg"></div>
  </div>
  <div class="g2048-lb" id="g24-lb"></div>
</div>
<div class="gm-hint">↑↓←→ / WASD / 滑动 | 合并到 2048 获胜</div>
<div class="brand">Powered by <a href="https://github.com/SunsetzF2023/omnia" target="_blank">Omnia</a></div>

<script>
const APPSCRIPT='https://script.google.com/macros/s/AKfycbyDR6xKzyevIhi3e1zgWC8KvnWH2JaB7ni7Eo_Md7SKknRASUOtRt8Hj_02470Z-CmV3w/exec';
let gridSize=4, cellPx,gap,font;

function setSize(n){gridSize=n;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&n===4)||(i===1&&n===5)||(i===2&&n===6)));G24.init()}

function fitCell(){const w=Math.min(window.innerWidth-340,500);const c=Math.floor((w-16)/(gridSize+1));cellPx=Math.max(24,Math.min(c,gridSize===4?80:gridSize===5?64:52));gap=Math.max(3,Math.round(cellPx/12));font=Math.round(cellPx*(gridSize===4?.35:gridSize===5?.34:.33))}

const TILE_COLORS={'2':{bg:'#eee4da',fg:'#776e65'},'4':{bg:'#ede0c8',fg:'#776e65'},'8':{bg:'#f2b179',fg:'#f9f6f2'},'16':{bg:'#f59563',fg:'#f9f6f2'},'32':{bg:'#f67c5f',fg:'#f9f6f2'},'64':{bg:'#f65e3b',fg:'#f9f6f2'},'128':{bg:'#edcf72',fg:'#f9f6f2'},'256':{bg:'#edcc61',fg:'#f9f6f2'},'512':{bg:'#edc850',fg:'#f9f6f2'},'1024':{bg:'#edc53f',fg:'#f9f6f2'},'2048':{bg:'#edc22e',fg:'#f9f6f2'}};

const G24={tiles:[],score:0,best:0,over:false,won:false,nextId:1,moving:false,elMap:{},_history:[],_undoLeft:5,_touchX:0,_touchY:0,_lbPage:0,leaderboard:[],playerName:'',_scored:false,

init(){G24.tiles=[];G24.score=0;G24.over=false;G24.won=false;G24.nextId=1;G24.moving=false;G24.elMap={};G24._history=[];G24._undoLeft=5;G24.playerName='';G24._scored=false;G24.best=parseInt(localStorage.getItem('2048_best_'+gridSize)||'0');G24._spawn();G24._spawn();G24._render();G24._updateUI();G24._fetchLB()},

_randomName(){const a=['Swift','Storm','Shadow','Nova','Blaze','Frost','Rogue','Ace','Echo','Neon','Zen','Flux','Void','Hawk','Lynx'];const n=['Tile','Grid','Merge','Pixel','Slide','Block','Shift','Spin','Dash','Wave','Core','Link','Path','Rush','Edge'];return a[Math.floor(Math.random()*a.length)]+n[Math.floor(Math.random()*n.length)]},

_saveScore(){const i=document.getElementById('g24-name-input');G24.playerName=(i?.value||'').trim()||G24._randomName();G24._saveToLB();G24._renderLeaderboard();const w=document.getElementById('g24-name-wrap');if(w)w.innerHTML='<span style="color:var(--amber);font-size:13px">✅ '+G24.playerName+' · '+G24.score.toLocaleString()+' 分 已上榜</span>'},

_saveToLB(){if(G24.score<=0)return;const lb=G24.leaderboard||[];const e={name:G24.playerName,score:G24.score,ts:new Date().toISOString()};const idx=lb.findIndex(x=>x.name===G24.playerName);if(idx>=0){if(G24.score>lb[idx].score)lb[idx]=e}else lb.push(e);lb.sort((a,b)=>b.score-a.score);G24.leaderboard=lb.slice(0,50);localStorage.setItem('2048_lb_'+gridSize,JSON.stringify(G24.leaderboard));try{new Image().src=APPSCRIPT+'?action=lb_submit&size='+gridSize+'&name='+encodeURIComponent(G24.playerName)+'&score='+G24.score}catch(_){}},

_fetchLB(){const r=localStorage.getItem('2048_lb_'+gridSize);G24.leaderboard=r?JSON.parse(r):[];fetch(APPSCRIPT+'?action=lb_get&size='+gridSize).then(r=>r.json()).then(d=>{if(Array.isArray(d)&&d.length){const local=G24.leaderboard;d.forEach(re=>{const i=local.findIndex(x=>x.name===re.name);if(i>=0){if(re.score>local[i].score)local[i]=re}else local.push(re)});local.sort((a,b)=>b.score-a.score);G24.leaderboard=local.slice(0,50);localStorage.setItem('2048_lb_'+gridSize,JSON.stringify(G24.leaderboard))}G24._renderLeaderboard()}).catch(()=>{G24._renderLeaderboard()})},

_renderLeaderboard(){const lb=document.getElementById('g24-lb');if(!lb)return;const P=10,t=Math.ceil(G24.leaderboard.length/P);if(G24._lbPage>=t)G24._lbPage=Math.max(0,t-1);const s=G24._lbPage*P,page=G24.leaderboard.slice(s,s+P);let h='<div class="g2048-lb-title">🏆 '+gridSize+'×'+gridSize+' 排行榜</div>';if(t>1){h+='<div class="g2048-lb-pager"><button '+(G24._lbPage===0?'disabled':'')+' onclick="G24._lbPage=Math.max(0,G24._lbPage-1);G24._renderLeaderboard()">◀</button><span>'+(G24._lbPage+1)+'/'+t+'</span><button '+(G24._lbPage>=t-1?'disabled':'')+' onclick="G24._lbPage=Math.min(t-1,G24._lbPage+1);G24._renderLeaderboard()">▶</button></div>'}const m=['🥇','🥈','🥉'];page.forEach((e,i)=>{const r=s+i;h+='<div class="g2048-lb-item'+(e.ts?' g2048-lb-clickable':'')+'"'+(e.ts?' onclick="alert(\'⏱ '+new Date(e.ts).toLocaleString()+'\')"':'')+'><span>'+(r<3?m[r]:r+1)+' '+e.name+'</span><span>'+e.score.toLocaleString()+'</span></div>'});lb.innerHTML=h},

_at(r,c){return G24.tiles.find(t=>t.row===r&&t.col===c)},

_spawn(){const empty=[];for(let r=0;r<gridSize;r++)for(let c=0;c<gridSize;c++)if(!G24._at(r,c))empty.push({r,c});if(!empty.length)return;const{p}=empty[Math.floor(Math.random()*empty.length)];const t={id:G24.nextId++,val:Math.random()<0.9?2:4,row:p.r,col:p.c,isNew:true};G24.tiles.push(t)},

_render(){const g=document.getElementById('g24-grid');if(!g)return;fitCell();const gw=gridSize*cellPx+(gridSize-1)*gap+16;g.style.cssText='width:'+gw+'px;height:'+gw+'px';g.innerHTML='';G24.elMap={};G24.tiles.forEach(t=>{const el=document.createElement('div');el.className='g2048-tile';const c=TILE_COLORS[String(t.val)]||{bg:'#3c3a32',fg:'#f9f6f2'};const fs=t.val>=1000?font*.8:t.val>=100?font*1:font;el.style.cssText='width:'+cellPx+'px;height:'+cellPx+'px;line-height:'+cellPx+'px;font-size:'+fs+'px;background:'+c.bg+';color:'+c.fg+';border-radius:4px;text-align:center;z-index:1';if(t.isNew){el.classList.add('g2048-new');t.isNew=false}el.textContent=t.val;g.appendChild(el);G24.elMap[t.id]=el});G24._syncDOM(false)},

_syncDOM(anim){const g=document.getElementById('g24-grid');G24.tiles.forEach(t=>{const el=G24.elMap[t.id];if(!el)return;const tx=8+t.col*(cellPx+gap),ty=8+t.row*(cellPx+gap);if(!anim){el.style.transition='none';el.style.transform='translate('+tx+'px,'+ty+'px)';void g.offsetHeight;el.style.transition=''}el.style.transform='translate('+tx+'px,'+ty+'px)'})},

move(dir){if(G24.over||G24.moving)return;G24.moving=true;G24._history.push({tiles:G24.tiles.map(t=>({id:t.id,val:t.val,row:t.row,col:t.col})),score:G24.score});const v={up:{dr:-1,dc:0},down:{dr:1,dc:0},left:{dr:0,dc:-1},right:{dr:0,dc:1}}[dir];if(!v){G24.moving=false;return}const{dr,dc}=v;let moved=false,merged=new Set;const rows=Array.from({length:gridSize},(_,i)=>G24.tiles.filter(t=>t.row===i).sort((a,b)=>dc?dc>0?b.col-a.col:a.col-b.col:dr>0?b.row-a.row:a.row-b.row));if(dr){const cols=Array.from({length:gridSize},(_,i)=>G24.tiles.filter(t=>t.col===i).sort((a,b)=>dr>0?b.row-a.row:a.row-b.row));for(let c=0;c<gridSize;c++){let pos=dr>0?gridSize-1:0;for(const t of cols[c]){let nr=t.row;while(true){const nnr=nr+dr;if(nnr<0||nnr>=gridSize)break;const other=G24._at(nnr,c);if(other&&!merged.has(other.id)&&other.val===t.val){t.val*=2;G24.score+=t.val;t.row=nnr;G24.tiles=G24.tiles.filter(x=>x.id!==other.id);delete G24.elMap[other.id];merged.add(t.id);moved=true;break}if(other)break;nr=nnr}if(t.row!==nr){t.row=nr;moved=true}}}}
if(dc){for(let r=0;r<gridSize;r++){let pos=dc>0?gridSize-1:0;for(const t of rows[r]){let nc=t.col;while(true){const nnc=nc+dc;if(nnc<0||nnc>=gridSize)break;const other=G24._at(r,nnc);if(other&&!merged.has(other.id)&&other.val===t.val){t.val*=2;G24.score+=t.val;t.col=nnc;G24.tiles=G24.tiles.filter(x=>x.id!==other.id);delete G24.elMap[other.id];merged.add(t.id);moved=true;break}if(other)break;nc=nnc}if(t.col!==nc){t.col=nc;moved=true}}}}
if(moved){G24._spawn();G24._render();setTimeout(()=>{G24._syncDOM(true);G24.moving=false;G24._updateUI();if(!G24.won&&G24.tiles.some(t=>t.val===2048)){G24.won=true;G24._updateUI()}},20)}else{G24.moving=false;G24._history.pop();G24._checkOver()}},

_checkOver(){for(let r=0;r<gridSize;r++)for(let c=0;c<gridSize;c++){if(!G24._at(r,c))return;if(c<gridSize-1){const a=G24._at(r,c),b=G24._at(r,c+1);if(a&&b&&a.val===b.val)return}if(r<gridSize-1){const a=G24._at(r,c),b=G24._at(r+1,c);if(a&&b&&a.val===b.val)return}}G24.over=true;G24._updateUI()},

_undo(){if(G24.moving||G24.over||!G24._history.length||G24._undoLeft<=0)return;G24._undoLeft--;const s=G24._history.pop();G24.tiles=s.tiles.map(t=>({...t,isNew:false}));G24.score=s.score;G24._render();G24._syncDOM(false);G24._updateUI()},

_updateUI(){document.getElementById('g24-score').textContent=G24.score;const m=document.getElementById('g24-msg');if(m){if(G24.over){m.style.display='flex';m.style.pointerEvents='auto';m.innerHTML='<div class="g2048-over">Game Over</div>'}else{m.style.display='none';m.innerHTML=''}}if(G24.over&&!G24._scored){G24._scored=true;const r=G24._randomName();if(m)m.innerHTML+='<div id="g24-name-wrap" style="margin-top:10px;display:flex;gap:6px;justify-content:center;align-items:center"><input id="g24-name-input" value="'+r+'" style="width:120px;padding:4px 8px;background:var(--bg);border:1px solid var(--amber);border-radius:4px;color:var(--fg);font-size:13px;text-align:center;font-family:var(--mono)" maxlength="16"><button onclick="G24._saveScore()" style="padding:4px 12px;background:var(--amber-dim);border:1px solid var(--amber);color:var(--amber);border-radius:4px;cursor:pointer;font-size:12px;font-family:var(--mono)">保存分数</button></div>';setTimeout(()=>{const inp=document.getElementById('g24-name-input');if(inp){inp.focus();inp.select()}},50)}},

_touchStart(e){G24._touchX=e.touches[0].clientX;G24._touchY=e.touches[0].clientY},
_touchEnd(e){const dx=e.changedTouches[0].clientX-G24._touchX,dy=e.changedTouches[0].clientY-G24._touchY;if(Math.abs(dx)<20&&Math.abs(dy)<20)return;if(Math.abs(dx)>Math.abs(dy))G24.move(dx>0?'right':'left');else G24.move(dy>0?'down':'up')}
};

document.addEventListener('keydown',e=>{const map={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down',a:'left',A:'left',d:'right',D:'right',w:'up',W:'up',s:'down',S:'down'};if(e.target.id==='g24-name-input')return;if(map[e.key]){e.preventDefault();if(e.ctrlKey&&e.key==='z'){G24._undo();return}G24.move(map[e.key])}});
const g=document.getElementById('g24-grid');
if(g){g.addEventListener('touchstart',e=>{G24._touchStart(e)},false);g.addEventListener('touchend',e=>{G24._touchEnd(e)},false);g.addEventListener('touchmove',e=>{e.preventDefault()},false)}
window.addEventListener('resize',()=>{fitCell();G24._render();G24._syncDOM(false)});
G24.init();
</script>
</body>
</html>
